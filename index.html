<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <script>
      // This script runs before any other scripts to prevent flash of unstyled content
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemPrefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;

        if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
          document.documentElement.classList.add("dark");
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.classList.remove("dark");
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azuum - Form Management System</title>
    <link rel="icon" type="image/png" href="/logo.png" id="favicon" />
    <meta
      name="description"
      content="Professional form management and workflow system"
    />
    <link rel="apple-touch-icon" href="/logo.png" id="apple-touch-icon" />
    <style>
      /* Apply white filter to favicon */
      #favicon,
      #apple-touch-icon {
        filter: brightness(0) invert(1);
      }
    </style>
    <meta name="author" content="Azuum" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <meta property="og:title" content="Azuum - Form Management System" />
    <meta
      property="og:description"
      content="Professional form management and workflow system"
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
